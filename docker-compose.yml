version: '3.8'

services:
  gas-sensing:
    build: .
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    environment:
      - PYTHONPATH=/app
    ports:
      - "8888:8888"
    
  jupyter:
    build: .
    ports:
      - "8888:8888"
    volumes:
      - ./:/app
    command: ["jupyter", "notebook", "--ip=0.0.0.0", "--port=8888", "--no-browser"]
