  - kind: "section"
    title: "Results"
    subtitle: "Calibration • Detection limits • Selectivity • Validation"
    notes: |
      This section presents the quantitative outcomes produced by applying the full pipeline. Results are reported using standard calibration and analytical chemistry metrics (slope, residual noise, LoD, R², LOOCV R²) and are grounded in the controlled-chamber dataset. The first slides focus on acetone as the primary target, followed by multi-gas benchmarking to support the selectivity discussion.

  - kind: "image"
    title: "Main Result: Acetone Calibration Curve"
    image_path: "../generated_assets/exported/Acetone/plots/calibration_curve.png"
    image_width: 9.5
    image_top: 1.2
    image_border: true
    notes: |
      This is the primary quantitative result for acetone using the full pipeline. The x-axis is the known concentration levels measured under controlled chamber conditions, and the y-axis is the extracted wavelength shift (Δλ) produced by the feature-engineered centroid method within the optimized ROI. The linear trend indicates that the sensor response is well-approximated by a linear calibration model over the tested concentration range.

      The fitted slope is the analytical sensitivity S = {SENSITIVITY}, and the confidence interval {CI_95} quantifies uncertainty in the slope estimate given the available concentration levels and repeated measurements. The fit quality is summarized by R² = {R2}, which indicates that concentration explains nearly all of the variance in the extracted response under these controlled conditions.

      The most important point for this paper is how we translate this calibration into an analytical detection limit. We compute residual noise from the regression (reported here as σ via RMSE = {RESIDUAL_STD}) and then apply LoD = 3σ/|S|, yielding LoD = {LOD_THIS_WORK}. Because both σ and S depend on ROI and processing, the improvement factor {IMPROVEMENT_FACTOR}× relative to the baseline analysis is an analysis-driven gain on the same hardware platform.

