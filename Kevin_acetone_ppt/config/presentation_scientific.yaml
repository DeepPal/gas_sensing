    notes: |
      These robustness checks are included to address a common reviewer concern for data-driven pipelines: whether an apparently strong calibration could be an artefact of overfitting or of a fragile choice of ROI.

      The permutation test breaks the concentration–response relationship by shuffling labels and recomputing calibration performance, yielding a null distribution of R² values. If the observed R² is far from the null, it supports that the relationship is not a random coincidence under this dataset. The bootstrap analysis perturbs the data through resampling to estimate how sensitive the computed LoD is to noise fluctuations, providing an uncertainty distribution rather than a single point estimate.

      These are computational stress tests anchored to measured data; they support internal validity but do not replace independent external validation.

  - kind: "image"
