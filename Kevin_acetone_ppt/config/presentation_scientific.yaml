    notes: |
      This analysis explains what “LoD” means operationally in the context of noisy spectra. We convert the residual noise level σ into an LoD-level signal amplitude using the same kσ convention used throughout this work, then inject the corresponding synthetic centroid shift Δλ to simulate an LoD-level signal in the Δλ domain.

      We then compare the injected-signal distribution against the noise-only distribution and compute detection probability at a fixed false-positive rate (5%). The purpose is to build intuition that the LoD is not an arbitrary number: it corresponds to a detection regime where signal and noise are separable under the assumed statistical model. This is a simulation-based validation anchored to the measured residual noise; it does not create new experimental evidence beyond the dataset.

