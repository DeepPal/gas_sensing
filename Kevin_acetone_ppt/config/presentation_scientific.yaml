  - kind: "image"
    title: "Statistical Validation: Residual Analysis"
    image_path: "../generated_assets/exported/Acetone/plots/residual_analysis.png"
    image_width: 10.0
    image_top: 1.4
    notes: |
      Residual diagnostics are essential because the detection limit is computed from residual noise. If residuals show strong structure (nonlinearity, heteroscedasticity, drift) then σ_residuals would not be a stable noise estimate and the LoD could be misleading.

      Here we check three standard diagnostics: residuals versus fitted values (to look for systematic bias), the residual histogram (to assess whether Gaussian noise is a reasonable approximation), and the Q–Q plot (to assess normality assumptions). While perfect normality is not required, the key point is that residual behavior is consistent with using σ_residuals as a meaningful noise parameter, supporting residual-based LoD computation for this dataset.

  - kind: "image"
    title: "Cross-Validation: LOOCV Parity (Acetone)"
    image_path: "../generated_assets/acetone_loocv_parity.png"
    image_width: 9.0
    image_top: 1.3
    notes: |
      This parity plot shows observed Δλ values compared to LOOCV-predicted Δλ values. LOOCV is used here as a conservative check against overfitting given the limited number of concentration levels: each fold fits the calibration on all-but-one concentration level and predicts the held-out point.

      The closeness of points to the parity line and the LOOCV R² = {LOOCV_R2} indicate that the linear relationship is not dependent on any single concentration level. This supports the claim that the optimized ROI and feature extraction yield a calibration that generalizes within the measured concentration grid.

  - kind: "image"
    title: "Temporal Response Dynamics"
    image_path: "../generated_assets/exported/Acetone/plots/peak_tracking.png"
    image_width: 10.0
    image_top: 1.4
    notes: |
      This plot shows the time-domain response during concentration transitions. The existence of distinct plateaus supports the temporal gating approach used in the pipeline: we can isolate equilibrium behavior and avoid mixing transients into calibration.

      Response metrics such as T90 = {T90} and recovery time {RECOVERY} provide practical context for sensing applications. These values should be interpreted under the controlled chamber protocol used here; in real breath sampling, flow dynamics and humidity could alter apparent dynamics and would require additional validation.

  - kind: "image"
    title: "End-to-End Scientific Workflow"
    image_path: "../generated_assets/exported/Acetone/plots/comprehensive_diagnostic.png"
    image_width: 10.5
    image_top: 1.4
    notes: |
      This composite figure provides an end-to-end view of how the reported results are produced for a single VOC. It links the raw time-domain response to the extracted spectral feature, the ROI optimization outcome, and the final calibration and residual behavior.

      The intended takeaway is reproducibility and traceability: each metric (slope, R², σ_residuals, LoD) can be traced back to a specific data transformation step. This is especially important for a methodological paper because it shows that the improvement claim is grounded in an auditable pipeline rather than in isolated plots.

  - kind: "table"
    title: "Multi-Gas Performance Matrix"
    table_source: "multigas_results"
    notes: |
      This table is provided for completeness and reviewer convenience. It lists, for each VOC, the optimized ROI, sensitivity, R², LoD, monotonicity (Spearman ρ), and sample size under the standardized protocol.

      Two interpretation points matter. First, LoD is VOC-dependent and is not sub-ppm for every analyte; this is expected because both slope and residual noise depend on chemical interaction strength and on which spectral features dominate each VOC response. Second, the sign of Spearman ρ indicates direction (increasing versus decreasing response with concentration); negative values still indicate strong monotonic behavior when |ρ| is close to 1.

      Overall, the matrix supports the claim that the pipeline is general and can be applied across multiple VOCs under controlled chamber conditions, while also being transparent about the limits of performance for non-target analytes.

  # ===========================================================================
  # SECTION F: DISCUSSION & IMPACT (Slides 34-40)
  # ===========================================================================
  - kind: "section"
    title: "Discussion & Impact"
    subtitle: "Physical mechanism • Clinical relevance • Novelty • Future work"
    notes: |
      This section interprets the results rather than adding new quantitative claims. The discussion focuses on why the optimized ROI improves LoD in terms of the σ/|S| objective, what the results imply for breath-range motivation, what is genuinely novel from a methods perspective, and what limitations must be addressed before clinical translation.

  - kind: "bullets"
    title: "Interpretation: Why {OPTIMAL_ROI} Performs Better"
    bullets:
      - "**The Key Trade-off**:"
      - "    • Literature ROI ({LITERATURE_ROI}): High sensitivity, high noise"
      - "    • Our ROI ({OPTIMAL_ROI}): Lower sensitivity, much lower noise"
      - "**Evidence in this work**:"
      - "    • Empirically lower residual noise in the optimized ROI improves LoD (σ/|S|)"
      - "    • Mechanistic origin of the low-noise ROI remains under investigation"
      - "**Mathematical Consequence**:"
      - "    • LoD = 3σ/|S| → lower σ can dominate even when |S| decreases"
    notes: |
      This interpretation is intentionally grounded in the measured metrics rather than speculative mechanism. The data show that the optimized ROI ({OPTIMAL_ROI}) yields a substantially lower residual noise level than the literature ROI ({LITERATURE_ROI}), even if its sensitivity is not the largest. Because LoD is proportional to σ/|S|, reducing σ can dominate the detection limit even when slope decreases.

      The “why” is therefore primarily metrological: the optimized window is empirically more stable for this sensor under this protocol. The deeper physical origin of why this wavelength window is lower-noise (e.g., multimode interference structure, scattering, absorption background, or ZnO optical properties) is not fully resolved in this dataset. We avoid overclaiming a mechanism without dedicated optical modeling or spectroscopy.

  - kind: "bullets"
    title: "Clinical Relevance"
    bullets:
      - "**Detection Capability**:"
      - "    • Analytical LoD {LOD_THIS_WORK} is below literature breath thresholds"
      - "    • Threshold comparison is used as context (human-breath validation pending)"
      - "**Practical Advantages**:"
      - "    • Room temperature operation"
      - "    • Rapid response ({T90})"
      - "    • Non-invasive, low cost"
    notes: |
      Clinical relevance is discussed in terms of motivation and analytical capability, not diagnosis. The analytical LoD {LOD_THIS_WORK} is below literature breath acetone ranges, suggesting that the platform has sufficient analytical sensitivity to resolve breath-relevant concentrations under controlled conditions.

      However, real breath introduces confounders (humidity, complex VOC mixtures, sampling variability), so the correct claim boundary is: the sensor and pipeline demonstrate breath-range-motivated analytical sensitivity in a controlled chamber. A prospective breath study is required to establish clinical utility, diagnostic performance, and robustness to real-world variability.

      The practical advantages listed—room-temperature operation, response time {T90}, and low-cost optical readout—are the reasons this platform is worth translating if the additional validation steps are completed.

  - kind: "bullets"
    title: "Scientific Novelty"
    bullets:
      - "**Spectral feature engineering** applied to optical fiber VOC sensors"
      - "**Data-driven ROI discovery**: Systematic optimization vs fixed literature ROI"
      - "**Algorithmic performance gain**: {IMPROVEMENT_FACTOR} fold LoD reduction with unchanged hardware"
      - "**Multi-analyte demonstration**: Applied across all 6 tested VOCs (controlled chamber)"
      - "**Rigorous validation**: LOOCV, residual analysis, multi-gas testing"
    notes: |
      The novelty here is methodological and is supported directly by the pipeline and results. Spectral feature engineering is adapted to an optical fiber VOC sensing context to reduce baseline artefacts and stabilize extracted features. ROI selection is elevated from a heuristic choice to a systematic optimization problem aligned with the detection-limit definition.

      The contribution is therefore an “analysis upgrade” to an existing ZnO–NCF platform: a {IMPROVEMENT_FACTOR} fold LoD reduction without changing the sensor hardware, demonstrated across multiple VOCs under a standardized protocol. The validation tools (LOOCV, residual diagnostics, and multi-gas benchmarking) are included to make the improvement claim defensible for a tier-1 methods paper.

  - kind: "bullets"
    title: "Limitations"
    bullets:
      - "**Validation Scope**:"
      - "    • Tested on synthetic gas mixtures"
      - "    • Real breath contains >500 VOCs"
      - "**Long-term Stability**:"
      - "    • Drift characterization needed for new ROI"
      - "    • Reference paper reports 0.2% drift over 30 days"
      - "**Environmental Factors**:"
      - "    • Temperature/humidity compensation not implemented"
      - "**Clinical Translation**:"
      - "    • Clinical trial required for regulatory approval"
    notes: |
      These limitations are included to keep the paper scientifically defensible and to prevent over-interpretation of controlled-chamber results. The VOC panel is limited and uses synthetic gas mixtures; real breath contains many more VOCs and strong humidity effects. Long-term drift behavior for the optimized ROI needs to be characterized directly, because drift can change σ_residuals and therefore LoD over time.

      Environmental compensation (temperature/humidity) is not implemented in this pipeline and would be required for real-world deployment. Finally, clinical translation requires breath sampling studies and appropriate ethical and regulatory pathways; this work establishes analytical feasibility and a reproducible methodology, not clinical validation.
  - kind: "image"
    title: "Limitations and Mitigation Plan"
    image_path: "../generated_assets/limitations_matrix.png"
    image_width: 10.8
    image_top: 1.4
    notes: |
      This matrix converts each limitation into a concrete mitigation plan so the reader can see a credible path from controlled-chamber feasibility to real-world validation. Each row links a gap (e.g., humidity sensitivity, interferent complexity, drift) to a specific next experiment or engineering solution (e.g., humidity-controlled breath sampling, expanded VOC panels, drift monitoring and recalibration strategies).

      The intent is to demonstrate that limitations are understood as engineering requirements and that the next steps are well-defined, which is often important for reviewers evaluating translational relevance.

  - kind: "bullets"
    title: "Future Work"
    bullets:
      - "**Near-term (6 months)**:"
      - "    • Clinical validation with real breath samples (N > 100)"
      - "    • Long-term stability characterization"
      - "**Medium-term (1 year)**:"
      - "    • Portable device integration"
      - "    • Multi-biomarker detection panel"
      - "**Long-term (2+ years)**:"
      - "    • Clinical trial for diabetes screening"
      - "    • Regulatory pathway (FDA/CE approval)"
    notes: |
      The future-work items are organized by timeline to make the translation path realistic. Near-term work focuses on validating the pipeline on real breath samples with adequate cohort size and on quantifying long-term stability and drift under repeated cycling.

      Medium-term work focuses on device-level integration, including robust packaging, portable optics, and embedded processing, as well as extending the approach to multi-biomarker panels. Long-term work acknowledges that clinical deployment requires formal trials and a regulatory pathway; the present work provides the analytical-methodology foundation that those steps would build upon.

  - kind: "bullets"
    title: "Key Conclusions"
    bullets:
      - "**Detection limit reduction**:"
      - "    • {LOD_PAPER} → {LOD_THIS_WORK} (≈95% reduction; {IMPROVEMENT_FACTOR} fold)"
      - "**Calibration performance**:"
      - "    • R² = {R2}, Spearman ρ = 1.00"
      - "**Clinical context**:"
      - "    • Analytical LoD supports breath-range motivation (clinical validation pending)"
      - "**Data-analysis–driven improvement**:"
      - "    • Same sensor hardware; gains arise from data processing methodology"
      - "**Generalizable platform**:"
      - "    • Demonstrated across all tested VOCs in controlled chamber experiments"
    notes: |
      The conclusions should be read as a tightly bounded summary of what the dataset supports. First, on the same ZnO–NCF platform, the proposed pipeline reduces analytical LoD from {LOD_PAPER} to {LOD_THIS_WORK}, corresponding to an ≈95% reduction and a {IMPROVEMENT_FACTOR} fold improvement. Second, calibration quality remains strong (R² = {R2} with perfect monotonic ranking in this dataset).

      Third, the breath ranges are used to motivate the analytical target, and the achieved LoD supports that motivation under controlled chamber conditions. Clinical breath validation is explicitly not claimed here. Finally, the workflow is generalizable in the sense that it can be applied consistently across a multi-VOC panel, producing transparent metrics (ROI, slope, R², LoD, ρ) for each analyte.

  # ===========================================================================
  # SECTION G: BACKUP SLIDES (Slides 41+)
  # ===========================================================================
  - kind: "section"
    title: "Backup Slides"
    subtitle: "Additional data • Method comparisons • Detailed diagnostics"
    notes: |
      These backup slides provide additional diagnostics and method comparisons that support the main claims. They are included to address detailed reviewer questions about baseline versus optimized ROI behavior, detectability at the LoD level, and why centroid wavelength shift is preferred over simpler absorbance-based features.

  - kind: "image"
    title: "Baseline vs Optimized ROI Comparison"
    image_path: "../generated_assets/baseline_vs_optimized_roi.png"
    image_width: 10.0
    image_top: 1.4
    notes: |
      This slide provides a direct “apples-to-apples” visualization of what changes when we move from a fixed literature ROI to the optimized ROI discovered by the pipeline. The baseline approach calibrates Δλ within the fixed ROI, while the proposed approach applies feature engineering and then selects an ROI that minimizes σ/|S|.

      The key point is that improvements are not necessarily due to increasing slope alone. The optimized ROI can reduce residual noise substantially, which improves LoD even if sensitivity decreases. This slide is useful when a reviewer asks exactly where the LoD gain comes from.

  - kind: "image"
    title: "Detectability Analysis (Signal-in-Noise)"
    image_path: "../generated_assets/performance_metrics.png"
    image_width: 10.0
    image_top: 1.4
    notes: |
      This is a detectability interpretation of the LoD definition. Using the measured residual noise level from the optimized calibration, we evaluate how separable an LoD-level signal is from the noise-only distribution.

      Detection probability is reported at a fixed false-positive rate (5%) to make the decision threshold explicit. This analysis is complementary to the numeric LoD computation: it helps a reader understand what LoD implies in terms of detection performance under the assumed noise model.

  - kind: "image"
    title: "Method Comparison: Δλ vs Absorbance"
    image_path: "../generated_assets/exported/Acetone/plots/method_comparison.png"
    image_width: 10.0
    image_top: 1.4
    notes: |
      This comparison explains why the paper uses centroid wavelength shift (Δλ) as the primary response variable rather than a single absorbance amplitude. In multimode interferometric spectra, absorbance amplitudes can be sensitive to baseline drift and intensity fluctuations, while spectral-shift features can be more stable and more linearly related to concentration under the tested protocol.

      The improved linearity and residual behavior for Δλ justify its use for regression, validation metrics, and LoD computation.

  - kind: "image"
    title: "Absorbance Calibration"
    image_path: "../generated_assets/exported/Acetone/plots/absorbance_calibration.png"
    image_width: 10.0
    image_top: 1.4
    notes: |
      This slide provides the absorbance-based calibration as a baseline reference method. Showing it explicitly prevents the perception that Δλ was chosen arbitrarily: it demonstrates that a simpler amplitude feature yields less favorable linearity and/or residual structure compared to the centroid shift approach.

      The conclusion is that centroid-based Δλ extraction is the more defensible choice for a methods paper focused on analytical LoD, because it produces a response with better regression behavior and more reliable residual-noise estimation.

  - kind: "image"
    title: "Spectral Feature Engineering Workflow (Build Feature Vector)"
    image_path: "../generated_assets/feature_engineering_workflow.png"
    notes: |
      This slide is a compact reminder of the feature engineering chain used throughout the analysis. The raw spectrum is normalized (transmittance), converted to absorbance, then transformed through derivative and convolution operations to emphasize informative spectral transitions and suppress baseline artefacts.

      The output of this stage is the feature representation used to compute weights for centroid extraction and to stabilize Δλ estimation. The purpose is not to create a black-box model, but to produce a reproducible and noise-robust response variable for linear calibration and LoD computation.
    position: 4.1

  - kind: "title"
    title: "Thank You"
    subtitle: "Questions?\n\n{AUTHORS}\nContact: your.email@university.edu"
    notes: |
      Closing slide. For a self-contained deck, this is also a place to restate the key one-sentence conclusion: the detection-limit improvement comes from optimizing σ/|S| through feature engineering and data-driven ROI discovery on an unchanged ZnO–NCF platform, demonstrated under controlled chamber conditions. Invite questions, especially about reproducibility, validation, and the path to breath studies.

