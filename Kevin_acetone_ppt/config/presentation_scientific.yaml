# =============================================================================
# SLIDE DEFINITIONS - Proper Scientific Flow
# =============================================================================
slides:

  # ===========================================================================
  # SECTION A: TITLE & MOTIVATION (Slides 1-5)
  # ===========================================================================
  - kind: "title"
    title: "{TITLE}"
    subtitle: "{SUBTITLE}\n\n{AUTHORS}\n{DATE}"
    notes: |
      This work targets a practical measurement problem: extracting clinically motivated acetone-relevant information from a low-cost optical fiber sensor under room-temperature operation. Breath acetone is widely discussed in the literature as a metabolic biomarker, so we use literature breath ranges only as context to define a realistic analytical sensitivity target.

      The core contribution is not a new sensor hardware platform; it is a reproducible, data-driven analysis workflow for a ZnO-coated no-core fiber (NCF) sensor whose raw output is a noisy, information-rich spectrum. The key technical idea is that the detection limit is not controlled by “sensitivity” alone. Instead, the LoD depends on the ratio of residual noise to slope, so we explicitly optimize the detection-limit objective by combining spectral feature engineering with data-driven region-of-interest (ROI) discovery.

      Throughout the talk, results are presented as controlled-chamber analytical performance. We do not claim clinical diagnostic accuracy here; clinical breath validation is positioned as future work. Next, the graphical abstract summarizes this pipeline and the main quantitative outcomes.

  - kind: "image"
    title: "Graphical Abstract"
    image_path: "../generated_assets/graphical_abstract.png"
    image_width: 11.5
    image_top: 1.2
    notes: |
      This figure is a one-slide summary of the full story. The problem is that previously reported analysis on the same ZnO–NCF platform yields an LoD around {LOD_PAPER}, which is not well matched to breath-range motivation. Instead of changing the sensor, we change how we extract the signal: we apply spectral feature engineering to improve signal-to-noise and then perform systematic ROI discovery so the calibration is built on the wavelength window that minimizes the detection-limit objective.

      The outcome is summarized by the key metrics shown here: an analytical LoD of {LOD_THIS_WORK} (an {IMPROVEMENT_FACTOR} improvement relative to the baseline analysis) with near-linear calibration (R² = {R2}). The “impact” statement should be read as analytical performance at room temperature under controlled chamber conditions; translation to clinical breath requires additional validation.

  - kind: "bullets"
    title: "Core Novelty at a Glance"
    bullets:
      - "**Hardware held constant**: Same ZnO–NCF sensor stack (85 nm coating, identical chamber) as the reference study"
      - "**Algorithmic optimization**: Spectral feature engineering + hierarchical ROI search targeting σ/|S|"
      - "**Quantitative gain**: LoD improved from {LOD_PAPER} → {LOD_THIS_WORK} (≈{IMPROVEMENT_FACTOR}×) without new materials"
      - "**Reviewer-facing evidence**: LOOCV R² = {LOOCV_R2}, residual diagnostics, multi-gas reproducibility"
    notes: |
      This slide makes the novelty explicit for reviewers. The crucial point is that every improvement reported in this work comes from the analysis pipeline rather than sensor redesign. We emphasize the three ingredients that make the contribution unique: (1) strict hardware parity with the reference publication, (2) a detection-limit-driven optimization objective (minimize σ/|S|) implemented through feature engineering plus ROI search, and (3) quantitative proof points showing why this matters (LoD improvement and LOOCV validation).

      The bullets also remind the audience that the methodology is reviewer-defensible: every stage logs metrics, and the pipeline can be audited because it produces Δλ vs concentration plots, residual statistics, and ROI selection metadata.

  - kind: "bullets"
    title: "Talk Outline"
    bullets:
      - "Motivation and clinical context for breath acetone monitoring"
      - "Optical fiber sensing principle and ZnO–VOC interaction"
      - "Experimental design and data processing pipeline"
      - "Calibration results, detection limits, and statistical validation"
      - "Discussion, limitations, and future work"
    notes: |
      The presentation is organized to mirror a methods paper flow. We start with motivation and clinical context to justify why sub-ppm analytical performance matters for breath-range interpretation. Then we establish the minimal theoretical foundation: (i) why an NCF-based optical system produces wavelength-dependent features that can shift with adsorption, and (ii) why detection limit is fundamentally governed by both sensitivity and noise.

      With that foundation, we move into experimental design and reproducibility (system architecture, fabrication, VOC panel, and protocol), followed by the data-processing pipeline that converts raw spectra into validated calibration metrics. The results section then presents the main acetone calibration and detection limit, followed by multi-gas benchmarking to show how the same pipeline behaves across interferents. Finally, we interpret why the optimized ROI improves LoD, discuss limitations (controlled chamber, environmental factors, long-term drift), and lay out the path to clinical translation.

  - kind: "bullets"
    title: "The Global Diabetes Challenge"
    bullets:
      - "**537 million adults** have diabetes globally (IDF 2021)"
      - "Projected to reach **783 million by 2045** (IDF projection)"
      - "Current monitoring relies on **invasive capillary blood glucose testing**"
      - "Repeated finger-prick sampling reduces long-term adherence"
      - "**Motivation**: Develop non-invasive breath analysis for continuous glycemic monitoring"
    notes: |
      This slide is included to frame the problem as a measurement and monitoring challenge rather than a purely academic sensing demonstration. Diabetes prevalence and projected growth motivate the need for scalable, low-burden monitoring approaches. Current finger-prick methods are accurate but invasive and can reduce adherence when repeated frequently.

      Importantly, this is not a clinical-claims slide. It motivates an engineering requirement: if we want to use non-invasive proxies such as breath VOCs, then the underlying sensor system must deliver reliable analytical sensitivity and repeatability in the low-ppm regime using a portable form factor. This leads naturally to breath acetone, which is one of the most studied VOC targets in this context.

  - kind: "image"
    title: "Breath Acetone as Diabetes Biomarker"
    image_path: "../generated_assets/clinical_thresholds.png"
    image_width: 10.0
    image_top: 1.4
    notes: |
      The purpose of this plot is to translate “clinical context” into an analytical target without overstating claims. The ranges shown are literature-reported breath acetone levels often used when discussing healthy vs diabetic vs ketoacidosis contexts. Regardless of the exact cutoffs across studies, a practical implication is that a sensor intended for screening or monitoring should resolve concentration differences on the order of ~1 ppm and preferably below that.

      In this work we therefore focus on analytical detection capability and report an LoD of {LOD_THIS_WORK}. This LoD is computed from controlled chamber experiments using standard residual-noise-based methodology; it is not a clinical diagnostic metric. The correct interpretation is: “under controlled conditions, the analysis pipeline can extract sub-ppm acetone-relevant signal from this optical sensor.” Demonstrating performance on real human breath is future work because breath introduces additional VOC complexity, humidity effects, and sampling variability.

      This leads to the central technical question: how can we push an existing ZnO–NCF platform into sub-ppm analytical LoD without modifying the hardware?

  - kind: "bullets"
    title: "Current Detection Technologies"
    bullets:
      - "**Laboratory Methods**: GC-MS, PTR-MS, SIFT-MS"
      - "    • Excellent sensitivity (ppb-level LoD)"
      - "    • Expensive, bulky, requires trained operators"
      - "**Portable Sensors**: Electrochemical, metal-oxide resistive"
      - "    • Compact and low-cost"
      - "    • Prone to interference, baseline drift, and humidity sensitivity"
      - "**Optical Fiber Sensors**: EMI-immune, real-time, remote capable"
      - "    • For ZnO-NCF acetone sensors, reported LoD > 3 ppm (insufficient for clinical use)"
    notes: |
      This slide positions where our approach sits relative to the field. Laboratory instruments (GC–MS, PTR–MS, SIFT–MS) can reach very low detection limits, but they are expensive, bulky, and not designed for scalable, real-time monitoring. Many portable sensors are compact and low-cost, but they often suffer from drift, humidity sensitivity, and interference, which complicates selectivity.

      Optical fiber sensors are attractive because they can be EMI-immune, remote, and room-temperature compatible. However, in practice their analytical LoD can be limited by how the spectrum is processed and which spectral region is used for calibration. Our work focuses on this exact bottleneck: rather than changing the sensor, we improve the extracted signal quality and systematically choose the ROI that minimizes the detection-limit objective (σ/|S|). The next slides make this objective explicit and define the research questions.

  - kind: "bullets"
    title: "Research Objectives"
    bullets:
      - "**Primary Goal**: Achieve sub-ppm acetone detection using a ZnO-coated no-core fiber (NCF) sensor"
      - "**Approach**: Data-driven spectral feature engineering with ROI optimization"
      - "**Validation**: LOOCV, residual diagnostics, and multi-gas benchmarking"
      - "**Clinical Context**: Compare analytical performance to literature breath-acetone ranges (clinical validation pending)"
      - "**Key Innovation**: First application of spectral feature engineering to ZnO fiber VOC sensing"
    notes: |
      The objectives are deliberately framed to be testable and bounded. The primary goal is to achieve sub-ppm analytical acetone detection on a ZnO-coated NCF sensor, while keeping the hardware constant so that improvements can be attributed to the analysis methodology. The technical approach is a data-driven pipeline: feature engineering to suppress baseline artefacts and improve SNR, followed by ROI optimization to select the spectral window that minimizes the detection-limit objective.

      Validation is also defined explicitly. We use LOOCV and residual diagnostics to address internal validity and overfitting concerns within the measured concentration levels, and we extend the analysis to a six-VOC panel to evaluate selectivity and interference behavior under a standardized protocol. Clinical translation (breath sampling, population studies, humidity/temperature compensation) is outside the scope of the present dataset and is treated as future work rather than an implied claim.

  - kind: "bullets"
    title: "Key Research Questions and Hypotheses"
    bullets:
      - "**Q1 – Detection Limit**: Can optimized spectral processing and ROI selection reduce the LoD from {LOD_PAPER} to {LOD_THIS_WORK} using the same ZnO–NCF hardware?"
      - "**Q2 – Generalizability**: Does the data-driven pipeline maintain high calibration quality (R² > 0.98) across all six tested VOCs?"
      - "**Q3 – Clinical Context**: Is the achieved analytical LoD within literature breath-acetone ranges under controlled chamber conditions (clinical validation pending)?"
      - "**Hypothesis**: Algorithmic optimization of spectral features and ROI can enable sub-ppm analytical sensitivity without modifying the sensor platform."
    notes: |
      These questions define what is actually being tested. The first question is a like-for-like comparison: using the same ZnO–NCF sensor platform, can an analysis-driven pipeline reduce the detection limit from {LOD_PAPER} to {LOD_THIS_WORK}? This isolates the contribution to data processing rather than fabrication.

      The second question asks whether the pipeline generalizes across a small VOC panel: even if acetone performs best, does the same workflow produce high-quality calibrations (R² > 0.98) across all six VOCs under the same measurement protocol? The third question explicitly separates “clinical context” from “clinical claim”: we use breath ranges to motivate the target analytical performance, but we do not claim diagnostic performance without breath validation.

      With these questions set, the next section explains the theoretical foundation—how the sensor produces a measurable spectral response, and why the detection limit is fundamentally controlled by both sensitivity and noise.

  # ===========================================================================
  # SECTION B: THEORETICAL FOUNDATION (Slides 6-11)
  # ===========================================================================
  - kind: "section"
    title: "Theoretical Foundation"
    subtitle: "Optical fiber physics • ZnO surface chemistry • Detection limit theory"
    notes: |
      This section provides just enough physics and metrology to justify the analysis choices later in the paper. On the optical side, an NCF-based system produces multimode interference features that can shift when the effective boundary condition changes. On the chemical side, VOC adsorption on ZnO perturbs the surface environment and therefore the optical response. On the measurement side, the detection limit is not a subjective “smallest visible signal”; it is computed from sensitivity and residual noise using standard analytical chemistry definitions.

      The key point that will recur throughout the talk is that the ROI choice changes both the slope (sensitivity) and the residual noise, and therefore changes LoD through the σ/|S| ratio. This is why we treat ROI selection as an optimization problem rather than adopting a fixed window from prior work.

  - kind: "two_column"
    title: "Optical Fiber Sensing Principle"
    left_content:
      - "**No-Core Fiber (NCF)**: Multimode waveguide with strong evanescent field"
      - "**Evanescent Field**: Light extends ~50-200 nm beyond fiber surface"
      - "**Sensing Mechanism**:"
      - "    1. Light propagates through ZnO-coated NCF"
      - "    2. VOC molecules adsorb on ZnO surface"
      - "    3. Refractive index changes (Δn)"
      - "    4. Measurable wavelength shift (Δλ)"
    right_image: "../generated_assets/sensor_system_diagram.png"
    notes: |
      The sensor can be understood as a multimode interferometric transducer. Light propagating in a no-core fiber excites many guided modes, and their interference produces wavelength-dependent spectral structure. When the fiber is coated with ZnO and exposed to VOCs, adsorption modifies the local optical environment at the surface (through effective refractive index and/or loss changes). This perturbs the interference condition, so spectral features shift with VOC exposure.

      For this work we do not require a full electromagnetic mode solver to claim performance; instead, we treat the device as a reproducible system whose spectrum shifts in a concentration-dependent manner under a controlled protocol. The important implication for analysis is that the spectrum contains multiple candidate regions that could be used for calibration. Because different regions have different noise characteristics, ROI choice becomes an estimation-and-optimization problem. This motivates our systematic ROI scan to minimize LoD using the standard 3σ/|S| definition.

  - kind: "bullets"
    title: "ZnO Surface Chemistry"
    bullets:
      - "**ZnO Properties**: Wide bandgap (3.37 eV), n-type semiconductor"
      - "**Lewis Acid Sites**: Zn²⁺ sites act as electron acceptors"
      - "**Acetone Binding**: Carbonyl (C=O) coordinates with Zn²⁺"
      - "    • Binding energy: ~0.8 eV (chemisorption regime)"
      - "**Selectivity Origin**: Different functional groups exhibit different adsorption strengths"
      - "    • Ketone (C=O): ~0.8 eV → relatively strongest adsorption"
      - "    • Alcohol (-OH): ~0.4 eV"
      - "    • Aromatic (C-H): ~0.1 eV → relatively weakest adsorption"
    notes: |
      The surface chemistry is included to provide mechanistic plausibility for why different VOCs can produce different response strengths on ZnO. ZnO surfaces expose adsorption sites whose interaction strength depends on the VOC functional group. For acetone, the carbonyl group can interact strongly with Lewis-acidic Zn sites, which can plausibly create a larger or cleaner perturbation of the surface environment compared to weaker interactions.

      At the same time, we keep the mechanistic claim conservative: selectivity is demonstrated empirically in this work by applying the exact same pipeline to a six-VOC panel and reporting the resulting LoD and calibration metrics. We do not over-interpret adsorption energies as a quantitative predictor without dedicated spectroscopy/DFT validation.

  - kind: "equation"
    title: "Core Sensing Chemistry"
    equations:
      - "O₂(gas) → O₂⁻(surface) + e⁻"
      - "CH₃COCH₃ + O⁻ → CO₂ + H₂O + e⁻"
    notes: |
      These reactions are provided as the canonical ZnO gas-sensing chemistry context: oxygen adsorption and VOC interaction can alter the surface state. In many ZnO sensors this is read out electrically as a resistance change, but in our platform the readout is optical. The important point is not the exact electron accounting; it is that adsorption and surface interactions modify the ZnO surface environment, which in turn perturbs the optical boundary condition and yields a measurable spectral shift.

      With this physical picture established, we can now formalize what “good performance” means using detection-limit theory, and then design the analysis pipeline to optimize that objective.
    position: 3.2

  - kind: "bullets"
    title: "Detection Limit Fundamentals"
    bullets:
      - "**Definition used here**: LoD = 3 × σ / |S|"
      - "    • σ = standard deviation of blank/residuals"
      - "    • S = sensitivity (slope of calibration curve)"
      - "**Key Insight**: LoD depends on BOTH sensitivity AND noise"
      - "**Traditional Limitation**: Fixed ROI optimizes sensitivity, ignores noise"
      - "**Our Approach**: Optimize the ratio σ/|S|, not just |S| alone"
    notes: |
      This equation underpins the design; we reduce σ while maintaining sufficient S to minimize LoD.
      We compute σ from regression residuals after the end-to-end pipeline so the LoD reflects the full measurement + processing chain.
      Our data-driven approach evaluates 385 ROI candidates to find the optimal σ/|S| ratio.

  - kind: "equation"
    title: "Mathematical Framework"
    equations:
      - "LoD = 3 × σ_residuals / |S|"
      - "LoQ = 10 × σ_residuals / |S|"
      - "Δλ = S × C + b (calibration model)"
      - "R² = 1 - (SS_res / SS_tot)"
    notes: |
      These equations define exactly how performance is computed from the data, and they are the backbone of the “data-driven ROI discovery” claim. For each candidate ROI, we extract a scalar response (Δλ) for each concentration level and fit a linear model Δλ = S×C + b, where S is the sensitivity (slope) and b is the intercept. The fit quality is summarized by R², which measures how much of the variance in Δλ is explained by concentration.

      The detection limit and quantification limit are then computed using standard analytical chemistry definitions. Here σ_residuals is the standard deviation of the regression residuals (a direct empirical estimate of noise after applying the full pipeline), and S is the slope magnitude. This is critical: both σ_residuals and S depend on which wavelengths are included in the ROI, so ROI selection changes LoD through both terms.

      In the next slides, we visualize the sensitivity–noise trade-off and then explain why feature engineering and ROI optimization are the right levers for pushing LoD down without modifying the sensor hardware.

  - kind: "image"
    title: "The Sensitivity-Noise Trade-off"
    image_path: "../generated_assets/lod_tradeoff_diagram.png"
    image_width: 11.0
    image_top: 1.3
    notes: |
      This diagram illustrates the core metrology insight that motivates the entire pipeline. A region of the spectrum can look “sensitive” (large slope) but still yield a poor detection limit if its residual noise is large. Because LoD scales as 3σ/|S|, a modest reduction in slope can be more than compensated by a large reduction in noise.

      In the reference analysis, the literature ROI ({LITERATURE_ROI}) provides strong apparent sensitivity but exhibits higher residual scatter after regression. Our discovered ROI ({OPTIMAL_ROI}) produces a smaller slope but a much smaller σ_residuals, so the ratio σ/|S| improves substantially. The result is the reported {IMPROVEMENT_FACTOR} improvement in LoD for acetone, achieved purely by analysis choices.

      The next slide explains how we make the weak spectral information more usable before we even start ROI selection: we apply feature engineering to suppress baseline artefacts and emphasize informative transitions.

  - kind: "image"
    title: "Spectral Feature Engineering Concept"
    image_path: "../generated_assets/feature_engineering_workflow.png"
    image_width: 11.0
    image_top: 1.3
    notes: |
      The raw optical spectrum contains the acetone-induced perturbation, but it is embedded in baseline drift, multimode structure, and measurement noise. The goal of feature engineering here is not to “add information,” but to transform the measured spectrum into a representation where the concentration-dependent component is easier to extract reproducibly.

      We first convert the measured intensity to absorbance so that the signal is in a physically interpretable form. We then apply a Savitzky–Golay derivative to emphasize local spectral transitions and suppress slowly varying baseline components (which can otherwise dominate a simple peak-picking approach). Finally, the convolution step further emphasizes features where magnitude and slope co-occur, which is beneficial for weak absorber signatures.

      This processing step is important because it reduces σ_residuals downstream and stabilizes the extracted Δλ signal. After the representation is stabilized, we can justify a systematic ROI search to find the window that minimizes σ/|S|.

  # ===========================================================================
  # SECTION C: EXPERIMENTAL DESIGN (Slides 12-16)
  # ===========================================================================
  - kind: "section"
    title: "Experimental Design"
    subtitle: "Sensor system • Fabrication • VOC panel • Measurement protocol"
    notes: |
      This section documents the experimental setup and protocol at a level intended for reproducibility. Because the main claim of this paper is analysis-driven performance improvement, it is essential to specify the hardware and measurement conditions clearly so that readers can separate what is fixed (sensor platform and chamber protocol) from what is optimized (signal processing and ROI selection).

  - kind: "bullets"
    title: "Sensor System Architecture"
    bullets:
      - "**Light Source**: Halogen lamp (Ocean Optics HL-2000)"
      - "    • Broadband illumination ({WAVELENGTH_RANGE})"
      - "**Sensing Element**: ZnO-coated No-Core Fiber"
      - "    • Active length: {NCF_LENGTH}"
      - "    • ZnO coating thickness: {ZNO_THICKNESS}"
      - "**Spectrometer**: Thorlabs CCS200/M"
      - "    • Range: {WAVELENGTH_RANGE}, Resolution: {SPECTROMETER_RES}"
      - "**Gas Chamber**: Acrylic, 460 cm³, sealed"
      - "    • Temperature: {TEMP_STABILITY}, Humidity: {HUMIDITY}"
    notes: |
      This slide lists the complete measurement chain from illumination to readout, because each element can affect spectral stability and therefore σ_residuals. The halogen lamp provides broadband illumination across {WAVELENGTH_RANGE}, enabling ROI search across a wide spectral band. The spectrometer range and resolution ({SPECTROMETER_RES}) set the wavelength sampling and the smallest resolvable shift.

      The ZnO-coated NCF is the sensing element; the active length ({NCF_LENGTH}) and coating thickness ({ZNO_THICKNESS}) define the interaction region and are held constant throughout the study so that performance differences can be attributed to processing and ROI selection. The sealed chamber and controlled environmental conditions ({TEMP_STABILITY}, {HUMIDITY}) reduce uncontrolled variability. These conditions represent controlled-chamber analytical evaluation, not real-breath sampling conditions.

  - kind: "bullets"
    title: "ZnO Nanostructure Fabrication"
    bullets:
      - "**Sol-Gel Synthesis**:"
      - "    • Precursor: Zinc acetate dihydrate + KOH"
      - "    • Temperature: 60°C, Particle size: ~10 nm"
      - "**Deposition Process**:"
      - "    • Method: Spray coating at 250°C"
      - "    • Solution volume: 0.3 mL"
      - "**Post-Processing**:"
      - "    • Annealing: 250°C for 2 hours"
      - "    • Result: Crystalline wurtzite phase"
      - "**Characterization**: FESEM confirmed {ZNO_THICKNESS} uniform coating"
    notes: |
      Fabrication is summarized to establish that the ZnO layer is produced reproducibly and that the analysis improvements are not confounded by uncontrolled material variation. The sol–gel synthesis defines the nanoparticle formation conditions, the spray coating defines how ZnO is deposited on the fiber, and the annealing step promotes a stable crystalline phase.

      The coating thickness used in the analysis placeholders ({ZNO_THICKNESS}) is supported by FESEM characterization. In this paper, the fabrication is treated as the fixed baseline platform; our contribution focuses on extracting improved analytical performance from the same platform.
  - kind: "image"
    title: "ZnO Nanostructure Fabrication Workflow"
    image_path: "../generated_assets/fabrication_flow.png"
    image_width: 10.5
    image_top: 1.3
    notes: |
      This workflow figure provides a visual trace from synthesis to characterization so that the experimental work can be replicated. The key methodological point is that we do not change the sensor design between the baseline analysis and the proposed analysis; the improved LoD is achieved by how the spectral information is processed and how the ROI is selected.

  - kind: "bullets"
    title: "VOC Test Panel & Concentrations"
    bullets:
      - "**Primary Target**: Acetone (diabetes biomarker)"
      - "**Interferent VOCs**:"
      - "    • Ethanol — alcohol consumption marker"
      - "    • Methanol — toxic exposure indicator"
      - "    • Isopropanol — hand sanitizer component"
      - "    • Toluene, Xylene — environmental/industrial"
      - "**Concentration Levels**: 1, 3, 5, 10 ppm (4 levels)"
      - "**Replicates**: 3 trials per concentration per gas"
    notes: |
      The VOC panel is designed to support an empirical selectivity discussion. Acetone is the primary target, and the other VOCs are included as representative interferents spanning alcohols and aromatics. This is not intended to fully replicate the complexity of human breath (which contains many more VOCs), but it is a controlled and reproducible panel to test whether the same processing pipeline behaves consistently across chemically distinct analytes.

      Concentrations are chosen as 1, 3, 5, and 10 ppm so that calibration is performed over a consistent range for every VOC. Replicates (3 trials per concentration) provide repeated measurements for residual estimation and robustness checks.
  - kind: "image"
    title: "VOC Test Panel Concentrations"
    image_path: "../generated_assets/voc_concentrations.png"
    image_width: 9.8
    image_top: 1.4
    notes: |
      This plot is included to make the dataset structure explicit: every VOC is measured at the same four concentration levels, enabling like-for-like comparisons of slopes, residual noise, and detection limits. The uniform design is important because it ensures that differences in LoD across VOCs are not artefacts of different concentration grids.

  - kind: "bullets"
    title: "Measurement Protocol"
    bullets:
      - "**Per Measurement Cycle**:"
      - "    1. Baseline: ~200 frames in N₂"
      - "    2. Gas exposure: ~500 frames at target concentration"
      - "    3. Recovery: ~200 frames in N₂"
      - "**Acquisition Rate**: 10 ms per spectrum"
      - "**Purge Time**: 120 s between measurements"
      - "**Total Dataset**: {SAMPLE_SIZE}"
      - "    • 6 VOCs × 4 concentrations × 3 trials × time-series frames"
    notes: |
      The protocol is structured to separate baseline, exposure, and recovery phases so the analysis can isolate steady-state behavior. A baseline in N₂ establishes the reference spectrum and provides a noise floor. Exposure frames capture the concentration-dependent response. Recovery in N₂ helps verify reversibility and reduces the risk of carry-over.

      The acquisition rate (10 ms per spectrum) yields dense time series data that can be used for temporal gating. The purge time (120 s) is included to reduce memory effects between runs. The stated dataset size ({SAMPLE_SIZE}) reflects the full panel: 6 VOCs × 4 concentrations × 3 trials with hundreds of frames per phase, enabling both calibration and residual-based LoD estimation.
  - kind: "image"
    title: "Measurement Cycle Timeline"
    image_path: "../generated_assets/measurement_cycle.png"
    image_width: 11.0
    image_top: 1.4
    notes: |
      This timeline shows the temporal structure that motivates the later “temporal gating” step. Instead of averaging all frames (which would mix transients with steady-state), we explicitly leverage the baseline–plateau–recovery structure. The plateau region is where the sensor response is closest to equilibrium, and therefore where calibration is most stable.

      The high frame rate allows us to select the most informative frames and reduce noise by controlled averaging. The purge step supports repeatability across trials by reducing cross-contamination between exposures.

  # ===========================================================================
  # SECTION D: DATA PROCESSING PIPELINE (Slides 17-23)
  # ===========================================================================
  - kind: "section"
    title: "Data Processing Pipeline"
    subtitle: "Preprocessing • Temporal gating • ROI discovery • Calibration"
    notes: |
      This section describes the analysis pipeline as an explicit chain from raw spectra to quantitative performance metrics. Because the main contribution is methodological, each step is described in terms of what it corrects (baseline drift, transient mixing, noisy ROI choice) and how it affects the final detection-limit computation through σ_residuals and |S|.

  - kind: "image"
    title: "Pipeline Overview"
    image_path: "../generated_assets/pipeline_flowchart.png"
    image_width: 11.0
    image_top: 1.3
    notes: |
      This flowchart is the “contract” for how raw measurements become the reported LoD and R² values. Stage 1 converts raw intensity spectra into physically meaningful absorbance and applies standard smoothing and quality control. Stage 2 uses the time axis to isolate equilibrium (plateau) behavior and reduce variability by selecting and averaging the most informative frames.

      Stage 3 is the key methodological differentiator: instead of adopting a fixed ROI, we scan a large set of candidate wavelength windows and score them using calibration quality and detection-limit criteria. Stage 4 extracts Δλ via the centroid method, performs linear calibration, computes residual diagnostics, and then computes LoD from σ_residuals and |S|.

      The reason this pipeline improves LoD is that it targets σ reduction before regression and then chooses an ROI that minimizes σ/|S|. This is what enables the reported {IMPROVEMENT_FACTOR} reduction relative to the reference analysis under controlled chamber conditions.

  - kind: "bullets"
    title: "Stage 1: Spectral Preprocessing"
    bullets:
      - "**Transmittance Calculation**:"
      - "    T(λ) = I_sample(λ) / I_reference(λ)"
      - "**Absorbance (Beer-Lambert Law)**:"
      - "    A(λ) = -log₁₀[T(λ)]"
      - "**Smoothing**: Savitzky-Golay filter"
      - "    • Window: 11 points, Polynomial order: 2"
      - "    • Preserves spectral features while reducing noise"
      - "**Quality Control**: Baseline stability check, saturation detection"
    notes: |
      Preprocessing standardizes the spectra so that downstream features are comparable across runs and concentrations. Transmittance normalizes the sample spectrum to the reference spectrum, and absorbance converts the measurement into a form where signal changes are more directly related to concentration (Beer–Lambert motivation).

      A Savitzky–Golay filter is used because it reduces high-frequency noise while preserving the shape of spectral features, which is important when derivatives are later computed. Quality-control checks (baseline stability, saturation detection) reduce the risk that artefacts dominate the residuals and artificially inflate σ_residuals.
  - kind: "image"
    title: "Savitzky–Golay Processing Effect"
    image_path: "../generated_assets/sg_processing_demo.png"
    image_width: 10.5
    image_top: 1.4
    notes: |
      This figure illustrates why Savitzky–Golay smoothing and derivatives are used before ROI selection. The raw absorbance signal can include baseline drift and noise that obscures subtle concentration-dependent structure. Smoothing produces a stable estimate of the underlying spectrum, and the derivative emphasizes localized changes while suppressing slowly varying components.

      The derivative signal is later used within the ROI as part of the weighting function for centroid extraction. The practical impact is reduced variability in the extracted Δλ and therefore reduced σ_residuals in the calibration model.

  - kind: "image"
    title: "Feature Engineering: Real Spectrum Walkthrough"
    image_path: "../generated_assets/feature_engineering_progression.png"
    image_width: 10.8
    image_top: 1.2
    notes: |
      This five-panel figure shows an actual acetone 5 ppm spectrum marching through every step: raw intensity, normalized transmittance, absorbance, Savitzky–Golay derivative, and the convolutional weighting used for centroid extraction. Seeing the same data evolve makes the process concrete—baseline drift is suppressed, slow trends disappear, and the final convolution highlights localized transitions that drive the Δλ measurement.

      Reviewers often ask “what does the signal look like at each processing step?” This slide answers that question with real data so the audience sees that the transformations are deterministic, auditable, and directly tied to the LoD improvement.

  - kind: "equation"
    title: "Spectral Feature Engineering Mathematics"
    equations:
      - "T(λ) = I_sample / I_reference (Transmittance)"
      - "A(λ) = -log₁₀[T(λ)] (Beer-Lambert)"
      - "dA/dλ = Savitzky-Golay derivative (Feature extraction)"
      - "C(λ) = A(λ) ⊗ dA/dλ (Convolution enhancement)"
      - "SNR improvement for weak absorbers (qualitative)"
    notes: |
      The equations on this slide formalize the feature engineering used in the pipeline. The sequence is: normalize intensity to transmittance, convert to absorbance, compute a derivative to suppress baseline, and then use convolution to further emphasize informative transitions. The intent is to build a response representation that is less sensitive to slow drift and more sensitive to concentration-driven perturbations.

      Importantly, this is still a deterministic signal-processing pipeline, not a black-box classifier. The role of this step is to reduce downstream residual variance and make the centroid-based Δλ extraction stable across repeated measurements.

  - kind: "image"
    title: "ROI Discovery Workflow"
    image_path: "../generated_assets/roi_discovery_annotated.png"
    image_width: 11.0
    image_top: 1.4
    notes: |
      This slide visualizes the 385-candidate ROI scan. Each window is scored using the same calibration pipeline, and the objective is to minimize σ/|S| rather than maximize slope alone. The annotated plot highlights the traditional manual ROI (675–689 nm) versus the discovered ROI (580–590 nm) and shows how both R² and LoD metrics guide the selection.

      Explicitly presenting this workflow makes the novelty reviewer-friendly: it demonstrates that ROI choice is not ad hoc but derived from a hierarchical, auditable search that logs every candidate. The right-hand plots show the local morphology of the spectra within each ROI so the audience can see why noise suppression matters. This also reinforces that the improvement is algorithmic—no sensor changes are required to realize the better window.

  - kind: "bullets"
    title: "Stage 2: Temporal Gating"
    bullets:
      - "**Problem**: Not all frames are equally informative"
      - "**Phase Identification**:"
      - "    • Baseline → Rising → Plateau → Falling → Recovery"
      - "**Plateau Isolation**: Focus on equilibrium response only"
      - "**Top-K Frame Selection**:"
      - "    • Rank frames by response strength"
      - "    • Select top K=10 frames, average for final spectrum"
      - "**Result**: SNR improvement of 1.4-4.3×"
    notes: |
      Temporal gating uses the time-series nature of the data to avoid mixing transient response with equilibrium response. During a measurement cycle, the sensor passes through baseline, rising, plateau, falling, and recovery phases. Calibration is most stable when based on plateau behavior, where the response is closest to steady state.

      The top-K selection step ranks frames by response strength within the plateau and averages a small number of representative frames (K=10). This reduces random noise and yields a more stable spectrum for ROI evaluation. The resulting SNR improvement supports lower σ_residuals and therefore directly supports lower LoD.

  - kind: "bullets"
    title: "Stage 3: Data-Driven ROI Discovery"
    bullets:
      - "**Traditional Approach**: Use literature-reported ROI (fixed)"
      - "**Our Approach**: Systematic optimization"
      - "    • Scan range: 500-900 nm"
      - "    • Window widths: 10, 15, 20, 25, 30 nm"
      - "    • Center step: 5 nm"
      - "    • Total candidates: {ROI_CANDIDATES}"
      - "**Selection Criteria** (hierarchical):"
      - "    1. LOOCV R² (generalization)"
      - "    2. R² (fit quality)"
      - "    3. σ (noise level)"
      - "    4. |Slope| (sensitivity)"
    notes: |
      ROI discovery is the central optimization step. Rather than assuming the best wavelength window is the one with maximum sensitivity, we evaluate a large grid of candidate windows spanning 500–900 nm with multiple window widths and center steps, for a total of {ROI_CANDIDATES} candidates.

      For each candidate ROI, we run the same extraction and calibration steps and compute LOOCV R², R², residual noise (σ), and slope magnitude. The selection criteria are intentionally hierarchical: generalization (LOOCV) is prioritized, then fit quality, then noise, then sensitivity. This ordering prevents an ROI from being selected simply because it overfits or because it produces a large slope while still being noisy.

  - kind: "image"
    title: "ROI Discovery: Systematic Evaluation"
    image_path: "../generated_assets/exported/publication_figures/Figure3_roi_discovery.png"
    image_width: 10.0
    image_top: 1.4
    notes: |
      This figure visualizes the outcome of the ROI scan. Each candidate window is evaluated under the same calibration and validation procedure, and the optimal ROI is the one that yields the best detection-limit objective while maintaining strong calibration and cross-validation metrics.

      The key takeaway is that {OPTIMAL_ROI} emerges as the best-performing region for acetone in our dataset, while the literature ROI ({LITERATURE_ROI}) ranks lower primarily because it produces higher residual noise. This supports the main thesis: data-driven ROI selection is necessary when LoD is the objective, because sensitivity alone does not determine LoD.

  - kind: "bullets"
    title: "Stage 4: Calibration & Validation"
    bullets:
      - "**Centroid Method**: λ_centroid = Σ(λᵢ × wᵢ) / Σ(wᵢ)"
      - "    • wᵢ are non-negative feature-engineered weights within the ROI"
      - "**Wavelength Shift**: Δλ = λ_sample - λ_reference"
      - "**Linear Calibration**: Δλ = S × C + b"
      - "**Validation Metrics**:"
      - "    • R², Adjusted R²"
      - "    • Spearman ρ (monotonicity)"
      - "    • LOOCV R² (cross-validation)"
      - "    • Residual analysis (model validity)"
      - "**LoD Calculation**: LoD = 3 × σ_residuals / |S|"
    notes: |
      After the ROI is fixed, we extract a robust scalar response using the centroid method. The weights wᵢ are derived from the feature-engineered signal and constrained to be non-negative so that the centroid corresponds to a physically interpretable “center of mass” of the ROI response. The wavelength shift Δλ is then computed relative to a reference spectrum.

      Calibration is performed using a linear model across concentration levels. We report both fit quality (R²) and generalization estimates (LOOCV R²), along with monotonicity (Spearman ρ) to ensure the response ranks correctly with concentration even when slope sign differs. Residual diagnostics support the validity of using σ_residuals for LoD computation. LoD is then computed consistently from σ_residuals and |S| using the convention stated in the theory section.

  - kind: "image"
    title: "Raw Spectral Response"
    image_path: "../generated_assets/exported/Acetone/plots/spectral_overlay.png"
    image_width: 10.0
    image_top: 1.4
    image_border: true
    notes: |
      This overlay shows the raw spectral behavior before the details of feature engineering and ROI optimization are applied. The key observation is that concentration-dependent spectral changes exist and are reproducible enough to support a calibration model. Highlighting both the literature ROI and the optimized ROI makes it clear that multiple regions contain signal, but their noise characteristics differ.

      The stable baseline and consistent shift patterns are important because they justify treating the sensor as a repeatable transducer under controlled conditions. The next section then focuses on the quantitative results obtained when the full pipeline is applied.

