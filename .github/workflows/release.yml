name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"   # e.g. v1.2.3, v2.0.0rc1

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so setuptools-scm / changelog access works

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"           # e.g. v1.2.3
          PKG_VERSION=$(python -c "import spectraagent; print(spectraagent.__version__)")
          EXPECTED="v${PKG_VERSION}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "ERROR: git tag '$TAG' does not match spectraagent.__version__ ('$PKG_VERSION')"
            echo "       Update spectraagent/__init__.py before tagging."
            exit 1
          fi
          echo "Version check passed: $TAG == $EXPECTED"

      - name: Install package (for import check above to work)
        run: pip install -e ".[dev]"

      - name: Run fast test lane (release gate)
        run: pytest -q --tb=short -m "not reliability"

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify distributions
        run: twine check dist/*

      - name: Extract changelog section for this release
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          # Extract the section between the first two version headers
          NOTES=$(awk "/^## \[?${VERSION}\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SpectraAgent ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}

      # Optional: publish to PyPI when PYPI_API_TOKEN secret is configured.
      # Remove the `if:` condition once you're ready to publish.
      - name: Publish to PyPI
        if: ${{ secrets.PYPI_API_TOKEN != '' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
