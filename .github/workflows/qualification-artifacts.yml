name: Qualification Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-qualification-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run qualification prerequisite checks
        run: |
          python scripts/validate_workflows.py
          python -m ruff check . --select E9,F63,F7,F82
          python scripts/research_preflight.py --self-check
          python scripts/research_integrity_gate.py --self-check

      - name: Generate signed qualification artifacts
        env:
          QUALIFICATION_SIGNING_KEY: ${{ secrets.QUALIFICATION_SIGNING_KEY }}
          REF_NAME: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          GIT_SHA: ${{ github.sha }}
        run: |
          python scripts/generate_qualification_artifacts.py \
            --output-dir output/qualification/ci \
            --session-id "ci-${REF_NAME}" \
            --git-sha "${GIT_SHA}" \
            --ref-name "${REF_NAME}" \
            --run-id "${RUN_ID}" \
            --signing-key "${QUALIFICATION_SIGNING_KEY}"

      - name: Upload qualification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qualification-artifacts-${{ github.run_id }}
          path: output/qualification/ci/
          if-no-files-found: error
