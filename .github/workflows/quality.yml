name: Quality Gates

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  workflow-hygiene:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate workflow expressions
        run: python scripts/validate_workflows.py

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error

  quality-fast:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ml]"

      - name: Setup Node.js for frontend checks
        if: matrix.python-version == '3.11'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: spectraagent/webapp/frontend/package-lock.json

      - name: Frontend quality checks
        if: matrix.python-version == '3.11'
        run: |
          cd spectraagent/webapp/frontend
          npm ci
          npm run lint
          npm run test
          npm run build

      - name: Ruff lint (required — correctness only)
        run: ruff check . --select E9,F63,F7,F82

      - name: Ruff lint (advisory — style + modernization debt)
        continue-on-error: true
        run: ruff check .

      # Primary version: run with coverage and enforce threshold
      - name: Pytest fast lane + coverage (primary)
        if: matrix.python-version == '3.11'
        run: |
          pytest -q --tb=short -m "not reliability" \
            --cov=src --cov-report=term-missing \
            --cov-report=html:output/coverage \
            --cov-report=xml:output/coverage.xml \
            --cov-fail-under=70

      # Other versions: compatibility smoke check — no coverage overhead
      - name: Pytest fast lane (compat)
        if: matrix.python-version != '3.11'
        run: pytest -q --tb=short -m "not reliability"

      - name: Mypy src/ (required — clean package)
        run: mypy src --no-site-packages --ignore-missing-imports --disable-error-code import-untyped

      - name: Mypy legacy (advisory — tracked as tech debt)
        continue-on-error: true
        run: mypy run.py gas_analysis config dashboard tests --ignore-missing-imports

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            output/coverage/
            output/coverage.xml
          if-no-files-found: warn

      - name: Collect CI diagnostics on failure
        if: failure()
        run: python scripts/collect_ci_diagnostics.py --output output/test-results/ci-diagnostics-quality.md

      - name: Upload CI diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-quality-py${{ matrix.python-version }}
          path: output/test-results/ci-diagnostics-quality.md
          if-no-files-found: warn

  reliability:
    runs-on: ubuntu-latest
    needs: [quality-fast, workflow-hygiene]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Restore flaky-test history cache
        uses: actions/cache@v4
        with:
          path: output/test-history
          key: flaky-history-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            flaky-history-${{ runner.os }}-

      - name: Run research preflight self-check (required)
        run: python scripts/research_preflight.py --self-check

      - name: Pytest reliability lane (required)
        run: |
          mkdir -p output/test-results
          pytest -q --tb=short -m "reliability" --durations=20 --junitxml=output/test-results/reliability-junit.xml

      - name: Ingest run into flaky-test history
        if: always()
        run: |
          python scripts/detect_flaky_tests.py \
            --history-dir output/test-history \
            --ingest output/test-results/reliability-junit.xml

      - name: Detect flaky tests (advisory)
        if: always()
        run: |
          python scripts/detect_flaky_tests.py \
            --history-dir output/test-history \
            --output output/test-results/flaky-report.md \
            --advisory

      - name: Publish flaky-test report in workflow summary
        if: always()
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat output/test-results/flaky-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Build reliability markdown summary
        if: always()
        run: |
          python scripts/summarize_junit.py --junit output/test-results/reliability-junit.xml --output output/test-results/reliability-summary.md --title "Reliability Lane Summary" --top-n 10

      - name: Check reliability runtime budget (advisory)
        if: always()
        run: |
          python scripts/check_junit_budget.py --junit output/test-results/reliability-junit.xml --output output/test-results/reliability-budget.md --title "Reliability Lane Budget" --max-total-seconds 45 --max-case-seconds 12 --advisory

      - name: Publish reliability summary
        if: always()
        run: |
          {
            cat output/test-results/reliability-summary.md
            echo ""
            cat output/test-results/reliability-budget.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reliability test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reliability-report
          path: |
            output/test-results/reliability-junit.xml
            output/test-results/reliability-summary.md
            output/test-results/reliability-budget.md
            output/test-results/flaky-report.md
          if-no-files-found: error

      - name: Collect CI diagnostics on failure
        if: failure()
        run: python scripts/collect_ci_diagnostics.py --output output/test-results/ci-diagnostics-reliability.md

      - name: Upload CI diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-reliability
          path: output/test-results/ci-diagnostics-reliability.md
          if-no-files-found: warn

  docker-build:
    runs-on: ubuntu-latest
    needs: [quality-fast, workflow-hygiene, reliability]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build SpectraAgent image (validates Dockerfile)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: spectraagent
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: spectraagent:ci

      - name: Build dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: dashboard
          push: false
          cache-from: type=gha
          tags: spectraagent-dashboard:ci

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: test
          push: false
          load: true
          cache-from: type=gha
          tags: spectraagent-test:ci

      - name: Run tests in Docker
        run: docker run --rm spectraagent-test:ci

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -r requirements-docs.txt
          # Scientific libs for mkdocstrings import; torch CPU-only for eager imports
          pip install numpy scipy scikit-learn --quiet
          pip install torch --index-url https://download.pytorch.org/whl/cpu --quiet

      - name: Build docs (required - validates all references resolve)
        run: mkdocs build --strict

  post-pr-feedback:
    runs-on: ubuntu-latest
    # Only run on pull requests and only when something upstream failed
    if: >-
      github.event_name == 'pull_request' &&
      always() &&
      (
        needs.quality-fast.result == 'failure' ||
        needs.workflow-hygiene.result == 'failure' ||
        needs.reliability.result == 'failure'
      )
    needs: [quality-fast, workflow-hygiene, reliability]
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine failed job
        id: failed-job
        run: |
          if [ "${{ needs.workflow-hygiene.result }}" = "failure" ]; then
            echo "job=workflow-hygiene" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.quality-fast.result }}" = "failure" ]; then
            echo "job=quality-fast" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.reliability.result }}" = "failure" ]; then
            echo "job=reliability" >> "$GITHUB_OUTPUT"
          else
            echo "job=quality-fast" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate PR comment body
        run: |
          python scripts/generate_pr_comment.py \
            --job "${{ steps.failed-job.outputs.job }}" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --output output/pr-comment.md

      - name: Post troubleshooting comment on PR
        uses: marocchino/sticky-pr-comment@v2
        with:
          header: ci-troubleshooting
          path: output/pr-comment.md
