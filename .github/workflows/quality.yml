name: Quality Gates

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint (required)
        run: ruff check .

      - name: Pytest (required)
        run: pytest -q --tb=short

      - name: Mypy src/ (required — clean package)
        run: mypy src --no-site-packages --ignore-missing-imports

      - name: Mypy legacy (advisory — tracked as tech debt)
        continue-on-error: true
        run: mypy run.py gas_analysis config dashboard tests --ignore-missing-imports

  docker-build:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (validates Dockerfile)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: gas-api:ci

      - name: Build dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: dashboard
          push: false
          cache-from: type=gha
          tags: gas-dashboard:ci

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: test
          push: false
          load: true
          cache-from: type=gha
          tags: gas-test:ci

      - name: Run tests in Docker
        run: docker run --rm gas-test:ci

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -r requirements-docs.txt
          # Scientific libs for mkdocstrings import; torch CPU-only for eager imports
          pip install numpy scipy scikit-learn --quiet
          pip install torch --index-url https://download.pytorch.org/whl/cpu --quiet

      - name: Build docs (required - validates all references resolve)
        run: mkdocs build --strict
