# Configuration for the gas analysis project

# Preprocessing settings (applied to ROI spectra before feature extraction)
preprocessing_roi:
  smoothing:
    enabled: false    # DISABLED: Over-smoothing destroys peak localization (was causing R²=0.74)
    window: 5         # Reduced window (was 11, too aggressive)
    poly_order: 2     # Polynomial order for S-G filter

# Data loading settings
data:
  # Path to the root data directory
  base_dir: "data/JOY_Data"
  # Directory template for experiment runs (used as generic fallback)
  exp_dir_template: "{concentration}-{run}"
  per_gas_templates:
    Ethanol: "Multi mix vary-EtOH-{concentration}-{run}"
    Isopropanol: "Multi mix vary-IPA-{concentration}-{run}"
    Methanol: "Multi mix vary-MeOH-{concentration}-{run}"
    MixVOC: "Mixed gas/{concentration} ppm EtOH IPA MeOH-{run}"
  # Reference files (relative to base_dir)
  ref_files:
    Ethanol: 'ref MutiAuMIP-EtOH.csv'
    Isopropanol: 'ref AuMutiMIP-IPA.csv'
    Methanol: 'ref AuMutiMIP-MeOH.csv'
    MixVOC: 'ref AuMutiMIP-MIX.csv'
  # CSV parsing settings
  skiprows: 0
  header: null
  names: ["wavelength", "intensity"]

# Peak detection settings
peak_detection:
  prominence: 0.1
  width: 5
  distance: 10

# Analysis settings
analysis:
  calibration_factor: 1.0
  enable_absorbance: true
  primary_signal: absorbance  # use absorbance response curves for ROI plots
  signal_strategies:
    intensity:
      baseline:
        enabled: true
        method: als
        order: 2
      normalize:
        enabled: true
        method: minmax
      smooth:
        enabled: true
        method: savgol
        window: 15
        poly_order: 2
    transmittance:
      smooth:
        enabled: true
        method: savgol
        window: 11
        poly_order: 2
      center:
        enabled: true
        mode: mean
    absorbance:
      smooth:
        enabled: true
        method: savgol
        window: 7
        poly_order: 2
      center:
        enabled: true
        mode: median

# Calibration settings
calibration:
  model: auto  # Auto-select best model (polynomial blocked by CV check, Langmuir enabled)
  polynomial_degree: 2
  x_transform: auto                 # auto: try linear, log10, sqrt and pick best R²
  use_transmittance: false          # rely on per-signal absorbance views
  auto_select_by: r2_cv
  outlier_removal:
    enabled: false                  # Keep all data points - do not exclude
    min_r2_improvement: 0.15
    max_removals: 0
  cv:
    enabled: true
  shift_method: xcorr
  xcorr_upsample: 10
  centroid_weight: contrast
  centroid_half_width: 5
  ensemble:
    enabled: true
    top_n: 3
  robust:
    enabled: true
    prefer: true
    epsilon: 1.35
    alpha: 0.0001
  bootstrap:
    enabled: true
    iterations: 500
    sample_fraction: 0.8
    min_unique: 2
    random_seed: 123
  multivariate:
    enabled: false  # Disabled: Linear model (R²=0.985) is sufficient, PLSR adds no value
    max_components: 6
    scale: true
    select_mode: auto
    # Robust selection gating
    min_r2_cv: 0.85          # minimum acceptable CV R² to select any multivariate model
    improve_margin: 0.05     # model must beat baseline by at least this margin in R²
    prefer_plsr_on_tie: true # prefer PLSR if within margin
    wl_min: 500.0
    wl_max: 900.0
    feature_prep: derivative+snv
    feature_selection:
      enabled: true
      method: coef_top_fraction
      top_fraction: 0.2
    cv:
      k: 5
      repeats: 10
      shuffle: true
      random_state: 42
      one_se_rule: true
    absorbance: true
  multi_roi_fusion:
    enabled: true         # Enable multi-ROI fusion (linear regression across top ROI shifts)
    max_features: 4       # Maximum number of ROI channels to include in fusion model
  qc:
    min_quality: 0.5   # minimum trial quality score (0–1) to include in QC-filtered calibration
    min_trials: 2      # minimum number of trials per concentration after QC
  auto_band_search:
    enabled: true
    scan_range: [500.0, 900.0]
    window_widths: [20.0, 30.0, 40.0]
    stride: 5.0
    prefer: best_plsr_cv

# Preprocessing settings
preprocessing:
  enabled: true
  apply_to_frames: false
  apply_to_transmittance: false      # preprocessing handled at frame stage for uniformity
  smooth:
    enabled: true
    method: savgol
    window: 11
    poly_order: 2
    extra_pass: false
  baseline:
    enabled: true                   # removes baseline drift to isolate gas shifts
    method: als
    order: 2
    # ALS (Asymmetric Least Squares, Eilers & Boelens 2005) parameters.
    # lambda: smoothness penalty (higher = smoother baseline, less flexible).
    #   Typical range: 1e3–1e7; 1e5 is a conservative default for LSPR spectra.
    # p: asymmetry weight (small p → baseline forced below peaks, as desired).
    #   Typical range: 0.001–0.1; 0.01 recommended for absorption spectra.
    # n_iter: convergence iterations (10 is sufficient for most spectra).
    als_lambda: 1.0e5
    als_p: 0.01
    als_n_iter: 10
  normalization:
    enabled: false
    method: minmax
  downsample:
    enabled: false
    factor: 1
    target_points: null
  outlier_rejection:
    enabled: true
    threshold: 2.5

archiving:
  enabled: false

reporting:
  generate_notebook: true
  export_pdf: true
  nbconvert_executable: "jupyter"
  trend_plots: true
  slope_to_noise_heatmap: true

dynamics:
  enabled: true
  signal: absorbance
  baseline_frames: 20  # Increased from 12 for better noise reduction → lower LOD
  frame_rate: 1.0      # frames per second for Δλ(t) plots and T90/T10; set null for auto-detect
  smoothing_window: 5
  min_response_amplitude_nm: 0.02      # gate for T90/T10; trials with smaller Δλ are excluded from dynamics stats
  timeseries_smoothing_window: 3       # rolling window (frames) for Δλ(t) in T90/T10 computation
  noise_sigma_multiplier: 1.5

environment:
  enabled: false
  apply_to_frames: false
  apply_to_transmittance: true
  reference:
    temperature: 25.0  # degC
    humidity: 50.0     # %RH
  # First-order additive compensation: signal -= cT*(T - T_ref) + cH*(H - H_ref)
  coefficients:
    temperature: 0.0
    humidity: 0.0
  # If true, write back estimated coefficients after a run
  autosave_coefficients: false
  # If no sensor columns available, override environment values here
  override:
    temperature: null
    humidity: null

advanced:
  deconvolution:
    ica:
      enabled: false
      n_components: 2
      max_iter: 500
      tol: 1.0e-4
      random_state: 0
    mcr_als:
      enabled: false
      n_components: 2
      max_iter: 200
      tol: 1.0e-5
      random_state: 0

roi:
  debug_regressions: false
  selection_metric: hybrid
  min_r2: 0.15
  r2_weight: 0.55
  band_half_width: 12
  min_wavelength: 500.0
  max_wavelength: 900.0
  band_window: 5
  expected_trend: any
  trend_modes:
    - decreasing   # valleys
    - increasing   # peaks
  min_corr: 0.5
  derivative_weight: 0.4
  ratio_weight: 0.3
  ratio_half_width: 5
  slope_noise_weight: 0.6
  min_slope_to_noise: 0.9
  min_abs_slope: 0.0
  multiple_testing:
    enabled: true
    method: bh
    alpha: 0.05
    require_significant_for_selection: true
  permutation_test:
    enabled: true
    n_iterations: 200
    random_state: 123
    summary_percentiles: [5, 50, 95]
  bootstrap:
    enabled: true
    iterations: 200
    random_state: 123
  adaptive_thresholds:
    enabled: true
    relaxation_factor: 0.6
  validation:
    expected_center: 500.0
    tolerance: 40.0
    notes: "Focused ROI for ethanol sensitivity (450–950 nm)."
  alternative_models:
    enabled: true
    polynomial_degree: 2
  adaptive_band:
    enabled: true
    slope_fraction: 0.75
    max_half_width: 50

  discovery:
    enabled: true
    band: [500.0, 900.0]
    window_nm: 12.0
    step_nm: 0.5
    expected_center: null
    prior_weight: 0.02
    gates:
      min_r2: 0.4               # Lowered from 0.7 to accept noisy data
      min_consistency: 0.6      # Lowered from 0.75 for real-world data
      min_snr: 1.5              # Lowered from 2.0 for weak signals
      min_abs_slope: 0.0
      min_conc_count: 3
    weights:
      r2: 1.5
      slope: 0.8                # Increased slope weight for sensitivity
      snr: 0.5                  # Increased SNR weight
    retain_top: 10

  per_gas_overrides:
    Ethanol:
      min_r2: 0.12
      min_slope_to_noise: 0.4
      validation:
        expected_center: 555.0
        tolerance: 20.0
        notes: "User-validated EtOH ROI near 554–556 nm"
      min_wavelength: 400.0
      max_wavelength: 700.0
    Methanol:
      min_r2: 0.15
      validation:
        expected_center: 684.0
        tolerance: 20.0
        notes: "User-validated MeOH ROI near 683–685 nm"
      min_wavelength: 650.0
      max_wavelength: 720.0
    Isopropanol:
      min_r2: 0.2
      validation:
        expected_center: 864.0
        tolerance: 20.0
        notes: "User-validated IPA ROI near 863–865 nm"
      min_wavelength: 820.0
      max_wavelength: 900.0

  shift:
    minimal_outputs: true             # minimal, production outputs only
    scan_enabled: true
    global_align: true               # CRITICAL: removes drift to isolate gas response
    window_nm: [5.0, 8.0, 10.0, 15.0, 20.0]  # scan multiple feature widths
    step_nm: 0.5
    upsample: 100
    use_transmittance: true          # match paper: wavelength shift in transmission spectrum
    smooth_window: 5                 # light smoothing to preserve shifts
    smooth_poly: 2
    feature_prep: derivative+snv     # enhance shift signals before regression
    derivative_min_span_nm: 6.0      # require ≥6 nm span before applying derivative
    sigma_clip_z: 3.5                # reject >3.5σ outliers within ROI shift samples
    fdr_alpha: 0.05
    min_slope_nm_per_ppm: 0.001
    min_r2_w: 0.40                   # Lowered from 0.80 for noisy real-world data
    min_spearman_r: 0.60             # Lowered from 0.85 to accept non-ideal monotonicity
    min_cv_r2_w: 0.0
    max_cv: 0.10                     # Increased from 0.05 to allow more variation
    selection_mode: hierarchical     # research-grade selection (LOOCV R² → R² → sd → |slope|)
    prefer_expected_center: false
    auto_relax_expected_center: false
    expected_center: null             # use roi.validation first; null disables hard prior
    tolerance: null
    # Absolute y-axis display (Option A)
    absolute_y_mode: centered
    absolute_y_fixed_span_nm: 0.40   # slightly wider for visibility
    absolute_y_secondary: true       # show Δλ secondary axis on mixed plots
    absolute_y_show_baseline: true   # annotate baseline λ₀
    alignment_tolerance_nm: 5.0
    min_window_overlap_fraction: 0.25
    detection_probability_threshold: 0.15
    bootstrap:
      enabled: true
      iterations: 1000
      confidence_level: 0.95
      random_state: 123

stability:
  weight_mode: max         # emphasize the strongest frames within response band
  top_k: 6
  diff_threshold: 0.03     # slightly relaxed gate to retain weak steady-state response
  min_block: 16            # longer stable segments improve slope estimates
  use_raw_intensity: true
  range_floor_fraction: 0.1
  smooth_window: 7

response_series:
  enabled: true
  smooth_window: 5
  baseline_frames: 12
  activation_delta: 0.003
  activation_sigma_multiplier: 1.5
  min_activation_frames: 6
  min_activation_fraction: 0.08
  fallback_window: 4
  restrict_to_responsive: true
  slope_sigma_multiplier: 1.25
  min_response_slope: 0.0
  noise_floor: 0.0005
  overrides:
    Acetone:
      activation_delta: 0.0003  # Lowered from 0.0008 - more sensitive
      activation_sigma_multiplier: 0.5  # Lowered from 0.8 - more sensitive
      min_activation_frames: 6  # Lowered from 8 - less strict
      min_activation_fraction: 0.03  # Lowered from 0.05 - detect shorter responses
      fallback_window: 12
      slope_sigma_multiplier: 0.8  # Lowered from 1.0
      min_response_slope: 0.0001  # Lowered from 0.0002
      noise_floor: 0.0001  # Lowered from 0.0002
      monotonic_tolerance_nm: 0.15  # Increased from 0.08 - allow more variation
      changepoint:
        enabled: true
        method: pelt
        penalty: 1.5  # Lowered from 3.0 - CRITICAL: detect more breakpoints!
        min_segment_size: 6  # Lowered from 8
        signal: abs_delta_lambda
        smooth_window: 5
        threshold_scale: 0.8  # Lowered from 1.2 - more sensitive
        release_multiplier: 0.5
    Methanol:
      activation_delta: 0.0035
      min_activation_frames: 6
      min_activation_fraction: 0.10
    Ethanol:
      activation_delta: 0.0015
      min_activation_frames: 6
      min_activation_fraction: 0.05
    Isopropanol:
      activation_delta: 0.003
      min_activation_frames: 6
      min_activation_fraction: 0.10
    Toluene:
      activation_delta: 0.0025
      min_activation_frames: 5
      min_activation_fraction: 0.08
    Xylene:
      activation_delta: 0.0025
      min_activation_frames: 5
      min_activation_fraction: 0.08
    MixVOC:
      activation_delta: 0.003
      min_activation_frames: 6
      min_activation_fraction: 0.10

# Dataset-level quality control thresholds (used in qc_summary.json)
quality:
  min_snr: 4.0
  max_rsd: 7.5    # percent
  snr_metric: median        # evaluate QC using median SNR unless overridden (options: min, median)
  snr_signal: absorbance    # preferred signal for SNR calculation; falls back if unavailable
  snr_region_nm: [520.0, 560.0]   # spectral window capturing EtOH response

# ---------------------------------------------------------------------------
# Real-time sensor configuration (used by src/inference/orchestrator.py)
# ---------------------------------------------------------------------------
sensor:
  integration_time_ms: 50.0       # CCS200 integration time (10 to 60000 ms)
  target_wavelength: 532.0        # Monitoring wavelength in nm (green laser)
  calibration_slope: 0.116        # nm/ppm  (from batch calibration results)
  calibration_intercept: 0.0      # nm offset
  reference_wavelength: 531.5     # Baseline peak wavelength in nm
  model_dir: "output/models"      # Directory for CNN + GPR checkpoints
  session_dir: "output/sessions"  # Root directory for session recordings
  save_raw_spectra: false         # Set true to save full 3648-pt spectra per frame
                                  # (warning: large files at high frame rates)
  noise_region_nm: [690.0, 720.0] # window dominated by baseline noise for SNR estimation
  # SNR definition (for documentation and reproducibility):
  # SNR = |Δλ| / σ_noise, where:
  #   Δλ = peak wavelength shift relative to reference (nm)
  #   σ_noise = std(intensity) in noise_region_nm after preprocessing
  # A SNR ≥ 3 is required to claim detection (3-sigma criterion, IUPAC 1995).
  # Reported SNR in publications should use this definition.
  snr_definition: "abs(delta_lambda_nm) / std(intensity_in_noise_region)"
  snr_detection_threshold: 3.0   # IUPAC minimum for detection claim
  snr_quantification_threshold: 10.0  # IUPAC minimum for quantification claim

# ---------------------------------------------------------------------------
# MLflow experiment tracking (src/training/)
# ---------------------------------------------------------------------------
mlflow:
  tracking_uri: "experiments/mlruns"    # local directory — no server needed
  experiment_name: "AuMIP_LSPR_Gas_Sensing"
  run_tags:
    project: "Au-MIP-LSPR"
    lab: "Chula"

# ---------------------------------------------------------------------------
# FastAPI inference server (src/api/)
# ---------------------------------------------------------------------------
api:
  host: "0.0.0.0"
  port: 8000
  model_dir: "models/registry"          # CNN .pt + GPR .joblib files
  pipeline_version: "3.0.0"
  reload: false                          # set true during development only
  log_requests: true

# ---------------------------------------------------------------------------
# Agent configuration (src/agents/)
# ---------------------------------------------------------------------------
agents:
  drift:
    enabled: true
    check_every_n_frames: 100
    drift_threshold_nm: 0.5
    auto_recalibrate: false
    auto_retrain: false
  quality:
    enabled: true
    saturation_threshold: 60000         # hard block
    min_snr_warning: 4.0                # warning only